<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="info">
        <h1 class="hud-text">Simulation Mode: Active</h1>
    </div>

    <div id="ui-overlay">
        <!-- Pantalla de Bienvenida -->
        <section id="welcome-screen" class="screen active">
            <div class="glass-panel">
                <img src="Logo simulador.png" alt="Logo Simulador" style="width: 250px; max-width: 100%; margin-bottom: 2rem; filter: drop-shadow(0 0 15px var(--neon-blue))">
                <h2 style="font-weight: 900; letter-spacing: 5px; color: #fff; margin-bottom: 0.5rem;">WELDING SIMULATOR</h2>
                <p class="hud-text" style="margin-bottom: 2rem;">Visual Computing & Thermal Analysis</p>
                <button id="btn-start" class="btn-futuristic" style="position: relative; z-index: 100;">EMPEZAR</button>
            </div>
        </section>

        <!-- Pantalla de Preguntas -->
        <section id="question-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <span id="step-count" class="hud-text">STEP 01/06</span>
                    <button id="btn-back" style="background: none; border: none; color: var(--neon-blue); cursor: pointer; font-family: inherit;">[ VOLVER ]</button>
                </div>
                <h2 id="question-title">SELECT MATERIAL</h2>
                <div id="options-gallery" class="options-grid">
                    <!-- Injected by JS -->
                </div>
            </div>
        </section>

        <!-- Pantalla Final / Resumen Visual -->
        <section id="result-screen" class="screen">
            <!-- Barra Superior: Resumen de Configuración -->
            <div class="glass-panel hud-top">
                <div id="visual-summary">
                    <!-- Data-driven HUD components -->
                </div>
            </div>

            <!-- Panel de Instrucciones: Pasos de Simulación -->
            <div id="sim-hud" class="glass-panel hud-instructions" style="display: none;">
                <div id="sim-instructions">
                    <h3 id="instr-title">Paso 1: Ángulo de Trabajo</h3>
                    <p id="instr-desc" class="hud-text">Usa <b>Z</b> y <b>X</b> para ajustar el ángulo lateral del electrodo hasta que el indicador esté en verde.</p>
                </div>
                <div id="sim-controls">
                    <button id="btn-next-step" class="btn-futuristic">SIGUIENTE PASO</button>
                    <button id="btn-start-weld" class="btn-futuristic">EMPEZAR A SOLDAR</button>
                </div>
            </div>

            <!-- CONTROLES TÁCTILES (Móvil) -->
            <div id="mobile-controls" class="mobile-only">
                <div id="ctrl-rotation" class="touch-group" style="display: none;">
                    <button class="touch-btn" data-key="z">↺</button>
                    <button class="touch-btn" data-key="x">↻</button>
                </div>
                <div id="ctrl-lead-rotation" class="touch-group" style="display: none;">
                    <button class="touch-btn" data-key="c">⤹</button>
                    <button class="touch-btn" data-key="v">⤸</button>
                </div>
                <div id="ctrl-distance" class="touch-group" style="display: none;">
                    <button class="touch-btn" data-key="q">↑</button>
                    <button class="touch-btn" data-key="e">↓</button>
                </div>
                <div id="ctrl-position" class="touch-group d-pad" style="display: none;">
                    <button class="touch-btn" data-key="w">▲</button>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="touch-btn" data-key="a">◀</button>
                        <button class="touch-btn" data-key="d">▶</button>
                    </div>
                    <button class="touch-btn" data-key="s">▼</button>
                </div>
            </div>

            <div class="result-actions">
                <button id="btn-results-back" class="btn-futuristic secondary">VOLVER</button>
                <button id="btn-restart" class="btn-futuristic">NUEVA SIMULACIÓN</button>
            </div>
        </section>

        <div class="footer-info">SYSTEM STATUS: OPTIMAL | © 2026 APRENDER CADA DÍA</div>
    </div>

    <!-- Load Three.js Global Version (r145 for OrbitControls support) -->
    <script src="https://unpkg.com/three@0.145.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.145.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="data.js"></script>
    <script src="main.js"></script>
    
    <script>
        console.log("System Initialized - Standard Script Mode");
        // Test if JS can talk to UI immediately
        window.addEventListener('load', () => {
            const btn = document.getElementById('btn-start');
            if(btn) {
                btn.onmousedown = () => console.log("MouseDown on Start");
                console.log("Button identified in inline script");
            }
        });
    </script>
</body>
</html>
